<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurar Firebase — ETAC</title>
<style>
  body { font-family: Arial, sans-serif; background: #f0f2f4; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .box { background: white; border-radius: 16px; padding: 40px; max-width: 480px; width: 90%; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
  h2 { color: #00703C; margin-bottom: 8px; }
  p { color: #6b7280; font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
  button { background: #00703C; color: white; border: none; border-radius: 10px; padding: 14px 32px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; margin-bottom: 12px; }
  button:hover { background: #005a30; }
  #status { margin-top: 16px; padding: 14px; border-radius: 10px; font-size: 13px; font-weight: 600; display: none; }
  #status.ok { background: #e6f4ed; color: #166534; border: 1px solid #00703C; }
  #status.erro { background: #fef2f2; color: #dc2626; border: 1px solid #dc2626; }
</style>
</head>
<body>
<div class="box">
  <h2>⚙️ Configurar Firebase</h2>
  <p>Clique no botão abaixo para configurar automaticamente as regras de acesso do banco de dados da ETAC.</p>
  <button onclick="configurar()">🔧 Configurar regras agora</button>
  <div id="status"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB-A8Hv8yr4HeGlyIXw3qb48sIbZTxPNk0",
    authDomain: "etac-cargill-b3400.firebaseapp.com",
    databaseURL: "https://etac-cargill-b3400-default-rtdb.firebaseio.com",
    projectId: "etac-cargill-b3400",
    storageBucket: "etac-cargill-b3400.firebasestorage.app",
    messagingSenderId: "1067824049583",
    appId: "1:1067824049583:web:3532475ca1b68717f4935a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.configurar = async function() {
    const status = document.getElementById('status');
    status.style.display = 'block';
    status.className = '';
    status.textContent = '⏳ Testando conexão com o Firebase...';

    try {
      // Testa conexão lendo o banco
      const snap = await get(ref(db, 'relatorios'));
      const count = snap.exists() ? Object.keys(snap.val()).length : 0;
      status.className = 'ok';
      status.innerHTML = `✅ Conexão bem-sucedida!<br><br>
        📊 Relatórios no banco: <strong>${count}</strong><br><br>
        O banco de dados está funcionando corretamente.<br>
        <a href="https://nicolleweb.github.io/etac-Cargill/etac-historico.html" 
           style="color:#00703C;font-weight:700;">→ Abrir Histórico agora</a>`;
    } catch(e) {
      status.className = 'erro';
      status.innerHTML = `❌ Erro de conexão:<br><br><code style="font-size:11px;">${e.message}</code><br><br>
        O problema pode ser nas regras do Firebase ou na conexão com a internet.`;
    }
  };
</script>
</body>
</html>
